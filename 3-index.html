<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list and tables</title>
</head>
<body>
    <ul>
            <li>apple</li>
            <li>mango</li>
            <li>orange</li>
         </ul>
         <hr>
          <ul>
            <li>apple</li>
            <ul>   <!-- for inside apple -->
                <li>color: red</li>
                <li>season: summer</li>
            </ul>
            <li>mango</li>
            <li>orange</li>
         </ul>


         <hr><hr>
         <ol>
            <li>apple</li>
            <li>mango</li>
            <li>orange</li>
         </ul>
         <hr>
          <ol>
            <li>apple</li>
            <ul>   <!-- for inside apple -->
                <li>color: red</li>
                <li>season: summer</li>
            </ul>
            <li>mango</li>
            <li>orange</li>
         </ol>

          <!--    tables     -->
<hr><hr>
    <table>
        <caption> my data</caption>
        <tr>
            <th>name</th>
            <th>roll no.</th>   
        </tr>
        <tr>
            <td>tanmay</td>
            <td>250</td>
        </tr>
         <tr>
            <td>alok</td>
            <td>350</td>
        </tr>
    </table>
</body>
</html>
