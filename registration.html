<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skill-option {
            display: flex;
            align-items: center;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>Student Registration</h2>
    <form action="/register" method="post">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="16" max="30" required>
        </div>
        
        <div class="form-group">
            <label for="branch">Branch:</label>
            <select id="branch" name="branch" required>
                <option value="">Select Branch</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Electrical">Electrical</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Civil">Civil</option>
                <option value="Electronics">Electronics</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="year">Course Year:</label>
            <select id="year" name="year" required>
                <option value="">Select Year</option>
                <option value="1">First Year</option>
                <option value="2">Second Year</option>
                <option value="3">Third Year</option>
                <option value="4">Fourth Year</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="specialization">Specialization:</label>
            <input type="text" id="specialization" name="specialization">
        </div>
        
        <div class="form-group">
            <label>Skills:</label>
            <div class="skills-container">
                <div class="skill-option">
                    <input type="checkbox" id="programming" name="skills" value="Programming">
                    <label for="programming" style="font-weight:normal">Programming</label>
                </div>
                <div class="skill-option">
                    <input type="checkbox" id="webdev" name="skills" value="Web Development">
                    <label for="webdev" style="font-weight:normal">Web Development</label>
                </div>
                <div class="skill-option">
                    <input type="checkbox" id="datascience" name="skills" value="Data Science">
                    <label for="datascience" style="font-weight:normal">Data Science</label>
                </div>
                <div class="skill-option">
                    <input type="checkbox" id="networking" name="skills" value="Networking">
                    <label for="networking" style="font-weight:normal">Networking</label>
                </div>
                <div class="skill-option">
                    <input type="checkbox" id="ai" name="skills" value="AI/ML">
                    <label for="ai" style="font-weight:normal">AI/ML</label>
                </div>
                <div class="skill-option">
                    <input type="checkbox" id="other" name="skills" value="Other">
                    <label for="other" style="font-weight:normal">Other</label>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label for="other-skills">Other Skills (if any):</label>
            <textarea id="other-skills" name="other-skills" rows="3"></textarea>
        </div>
        
        <button type="submit">Register</button>
    </form>
</body>
</html>
